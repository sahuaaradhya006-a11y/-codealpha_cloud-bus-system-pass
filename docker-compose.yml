services:
  bus-pass:
    build: .
    ports:
      - "3000:3000"
    environment:
      PORT: "3000"
      DB_PATH: "/data/bus-pass.sqlite"
      SIGNING_SECRET: "replace-with-a-long-random-secret"
      ADMIN_KEY: "replace-admin-key"
    volumes:
      - bus-pass-data:/data
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 20s
      timeout: 3s
      retries: 3

volumes:
  bus-pass-data:
